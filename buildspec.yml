version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - "python -m pip install --upgrade pip"
      - "pip install -r requirements.txt"

  pre_build:
    commands:
      - 'echo "Pre-build: run lint/tests (optional)"'
      # - "pytest -q"

  build:
    commands:
      - echo "Building deployable artifact..."
      - rm -rf artifact deploy-package.zip
      - mkdir -p artifact
      - |
        rsync -av --exclude='artifact' --exclude='.git' --exclude='deploy-package.zip' \
                --exclude='*.pyc' --exclude='__pycache__' ./ artifact/
      - rm -f artifact/.env
      - echo "BUILD_VERSION=$(git rev-parse --short HEAD)" > artifact/build_info.txt

  post_build:
    commands:
      - 'echo "Packaging artifact..."'
      - "cd artifact && zip -r ../deploy-package.zip ."

artifacts:
  files:
    - deploy-package.zip