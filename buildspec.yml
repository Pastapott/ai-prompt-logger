version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt
  pre_build:
    commands:
      - echo "Pre-build: run lint/tests (optional)"
      # - pytest -q  # enable if you add tests
  build:
    commands:
      - echo "Building deployable artifact..."
      # create directory for artifact
      - mkdir -p artifact
      - cp -r ./* artifact/
      - rm -f artifact/.env
  post_build:
    commands:
      - echo "Packaging artifact..."
      - cd artifact
      - zip -r ../deploy-package.zip .
artifacts:
  files:
    - deploy-package.zip